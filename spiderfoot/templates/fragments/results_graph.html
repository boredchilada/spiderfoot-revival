{# Graph tab — placeholder for Sigma.js rendering #}
{# scan_id: current scan ID #}

<div class="p-6">
  <div id="graph-container"
       class="bg-slate-50 dark:bg-sf-elevated rounded-lg border border-slate-200 dark:border-sf-border"
       style="min-height: 400px;"
       x-data="{ nodeCount: null, loading: true }"
       x-init="
         fetch('/api/scanviz?id={{ scan_id }}&gexf=0')
           .then(r => r.json())
           .then(data => {
             nodeCount = (data.nodes || []).length;
             loading = false;
           })
           .catch(() => { loading = false; })
       ">
    <div class="flex flex-col items-center justify-center h-full py-16">
      <svg class="w-12 h-12 text-slate-300 dark:text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
      </svg>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-2">Relationship Graph</p>
      <template x-if="loading">
        <p class="text-xs text-slate-400 dark:text-slate-500">Loading graph data...</p>
      </template>
      <template x-if="!loading && nodeCount !== null">
        <p class="text-xs text-slate-400 dark:text-slate-500">
          <span class="font-mono font-bold text-sf-accent" x-text="nodeCount"></span> nodes loaded.
          Full interactive rendering available in a future update.
        </p>
      </template>
      <template x-if="!loading && nodeCount === null">
        <p class="text-xs text-slate-400 dark:text-slate-500">No graph data available for this scan.</p>
      </template>
    </div>
  </div>
</div>

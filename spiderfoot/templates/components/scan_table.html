{# Scan table — full card with header + tbody that polls via HTMX #}
<div class="bg-white dark:bg-sf-surface border border-slate-200 dark:border-sf-border rounded-lg overflow-hidden">

  <div class="px-5 py-4 border-b border-slate-200 dark:border-sf-border flex items-center justify-between">
    <h2 class="text-sm font-semibold text-slate-700 dark:text-slate-200">Recent Scans</h2>
    <a href="/newscan"
       class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded
              bg-sf-accent text-white hover:bg-cyan-500 transition-colors">
      + New Scan
    </a>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left">
      <thead>
        <tr class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-sf-elevated">
          <th class="px-4 py-3 w-8"></th>
          <th class="px-4 py-3">Target</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Events</th>
          <th class="px-4 py-3">Started</th>
          <th class="px-4 py-3 text-right">Actions</th>
        </tr>
      </thead>
      <tbody
        id="scan-tbody"
        hx-get="/frag/scan-table"
        hx-trigger="every 5s"
        hx-swap="innerHTML">
        {% if scans %}
          {% for scan in scans %}
            {% include 'components/scan_row.html' %}
          {% endfor %}
        {% else %}
          <tr>
            <td colspan="6" class="px-4 py-12 text-center text-slate-400 dark:text-slate-500 text-sm">
              No scans yet —
              <a href="/newscan" class="text-sf-accent hover:underline ml-1">start a new scan</a>
            </td>
          </tr>
        {% endif %}
      </tbody>
    </table>
  </div>

</div>
